services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: glass
      POSTGRES_USER: glass
      POSTGRES_PASSWORD: glass
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db]
    volumes: [.:/app]
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

volumes:
  pgdata:
